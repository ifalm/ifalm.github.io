<!DOCTYPE html>
<html>
<head>

  <title>{{ .Site.Title }}</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <h1>{{ .Site.Params.author }}</h1>

  <footer>

  </footer>
</body>
</html>
