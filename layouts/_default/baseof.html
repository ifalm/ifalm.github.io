<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{{ if .IsHome }}IA | Portfolio{{ else }}{{ .Title }} · IA | Portfolio{{ end }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Lato:wght@300;400;700;900&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:         #080c12;
      --bg2:        #0d1320;
      --bg3:        #111d0e;
      --border:     #1e3018;
      --accent:     #4e9e3a;
      --accent-lit: #69C850;
      --accent-dim: rgba(105,200,80,.12);
      --accent-bdr: rgba(105,200,80,.3);
      --text:       #c2d4b8;
      --text-dim:   #6a8a5a;
      --text-bright:#f0f5ec;
      --mono:       'Space Mono', monospace;
      --sans:       'Lato', sans-serif;
      --r:          8px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--sans);
      background: var(--bg);
      color: var(--text);
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent-lit); text-decoration: none; transition: color .2s; }
    a:hover { color: var(--text-bright); }
    img { max-width: 100%; display: block; }
    main { flex: 1; }

    /* HEADER */
    .site-header {
      position: sticky; top: 0; z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1rem 3rem;
      background: rgba(8,12,18,0.94);
      backdrop-filter: blur(14px);
      border-bottom: 1px solid var(--border);
    }
    .site-logo { font-family: var(--mono); font-size: .9rem; color: var(--text-bright); letter-spacing: .05em; }
    .site-logo:hover { color: var(--accent-lit); }
    .logo-br { color: var(--accent-lit); }
    .site-nav { display: flex; gap: 2rem; }
    .site-nav a {
      font-family: var(--mono); font-size: .72rem; color: var(--text-dim);
      letter-spacing: .12em; text-transform: uppercase;
      padding-bottom: 2px; border-bottom: 1px solid transparent; transition: all .2s;
    }
    .site-nav a:hover, .site-nav a.active { color: var(--accent-lit); border-bottom-color: var(--accent-lit); }

    /* HERO */
    .hero {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; text-align: center;
      padding: 7rem 2rem 5rem;
      min-height: 65vh;
      position: relative; overflow: hidden;
    }
    .hero-glow {
      position: absolute; width: 700px; height: 700px; border-radius: 50%;
      background: radial-gradient(circle, rgba(59,151,85,.07) 0%, transparent 70%);
      top: 50%; left: 50%; transform: translate(-50%,-50%);
      pointer-events: none;
    }
    .hero-badge {
      font-family: var(--mono); font-size: .85rem; color: var(--accent-lit);
      letter-spacing: .22em; margin-bottom: 1.5rem;
      display: flex; align-items: center; justify-content: center; gap: .6rem;
      position: relative;
    }
    .hero-badge::before, .hero-badge::after {
      content: ''; display: inline-block; width: 28px; height: 1px;
      background: var(--accent-lit); opacity: .5;
    }
    .hero-title {
      font-family: var(--sans); font-size: clamp(2.4rem, 6vw, 4.5rem);
      font-weight: 900; line-height: 1.08; color: var(--text-bright);
      letter-spacing: -.02em; margin-bottom: 1.25rem; position: relative;
    }
    .hero-title .accent { color: var(--accent-lit); }
    .hero-sub {
      font-size: 1.05rem; color: var(--text-dim); font-weight: 300;
      max-width: 460px; margin: 0 auto 2.5rem; position: relative;
    }
    .hero-btn {
      display: inline-flex; align-items: center; gap: .5rem;
      font-family: var(--mono); font-size: .75rem;
      letter-spacing: .1em; text-transform: uppercase;
      color: #fff; background: var(--accent);
      padding: .85rem 2.2rem; border-radius: var(--r);
      position: relative; transition: all .2s;
      border: 1px solid var(--accent-lit);
    }
    .hero-btn:hover {
      background: var(--accent-lit); color: #fff;
      transform: translateY(-2px);
      box-shadow: 0 10px 28px rgba(59,151,85,.3);
    }

    /* SHARED */
    .section-tag {
      font-family: var(--mono); font-size: .85rem; color: var(--accent-lit);
      letter-spacing: .2em; display: block; margin-bottom: .5rem;
    }

    /* ABOUT */
    .about-section { padding: 5rem 3rem; }
    .about-inner { max-width: 860px; margin: 0 auto; text-align: center; }
    .about-inner h2 {
      font-size: clamp(1.2rem, 2vw, 2rem); font-weight: 800;
      color: var(--text-bright); letter-spacing: -.01em; margin-bottom: 1rem;
    }
    .about-inner p { color: var(--text); font-size: .95rem; font-weight: 300; line-height: 1.85; max-width: 600px; margin: 0 auto 1.1rem; }
    .skills-row { display: flex; flex-wrap: wrap; justify-content: center; gap: .75rem; }
    .skill-pill {
      font-family: var(--mono); font-size: .72rem; color: var(--text);
      letter-spacing: .04em; padding: .5rem 1.2rem;
      background: var(--bg3); border: 1px solid var(--border);
      border-radius: 99px; transition: border-color .2s, color .2s;
    }
    .skill-pill:hover { border-color: var(--accent-lit); color: var(--accent-lit); }


    /* PROJECTS */
    .projects-section { padding: 5rem 3rem; background: var(--bg2); border-bottom: 1px solid var(--border); }
    .section-header { margin-bottom: 2.5rem; text-align: center; }
    .section-header h2 {
      font-size: clamp(1.6rem, 3vw, 2.2rem); font-weight: 800;
      color: var(--text-bright); letter-spacing: -.01em;
    }
    .cards-grid {
      display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 1.5rem; max-width: 1100px; margin: 0 auto;
    }
    .project-card {
      background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r);
      overflow: hidden; transition: transform .2s, border-color .2s, box-shadow .2s;
    }
    .project-card:hover {
      transform: translateY(-5px); border-color: var(--accent);
      box-shadow: 0 14px 36px rgba(0,0,0,.5);
    }
    .card-image { position: relative; height: 160px; overflow: hidden; }
    .card-image img { width: 100%; height: 100%; object-fit: cover; transition: transform .4s; }
    .project-card:hover .card-image img { transform: scale(1.05); }
    .card-image-overlay { position: absolute; inset: 0; background: linear-gradient(to bottom, transparent 40%, var(--bg3)); }
    .card-body { padding: 1.1rem 1.4rem 1.4rem; }
    .card-tags { display: flex; flex-wrap: wrap; gap: .35rem; margin-bottom: .7rem; }
    .tag {
      font-family: var(--mono); font-size: .6rem; color: var(--accent-lit);
      background: var(--accent-dim); border: 1px solid var(--accent-bdr);
      padding: .12rem .45rem; border-radius: 3px; letter-spacing: .04em;
    }
    .card-title { font-size: 1rem; font-weight: 700; margin-bottom: .45rem; line-height: 1.3; }
    .card-title a { color: var(--text-bright); }
    .card-title a:hover { color: var(--accent-lit); }
    .card-summary { font-size: .84rem; color: var(--text-dim); margin-bottom: 1.1rem; line-height: 1.6; }
    .card-link { font-family: var(--mono); font-size: .72rem; color: var(--accent-lit); display: inline-flex; align-items: center; gap: .3rem; }
    .card-link .arr { transition: transform .2s; }
    .card-link:hover .arr { transform: translateX(4px); }

    /* FOOTER */
    .site-footer { border-top: 1px solid var(--border); padding: 1.5rem 3rem; }
    .footer-inner { display: flex; justify-content: space-between; align-items: center; }
    .footer-copy { font-family: var(--mono); font-size: .72rem; color: var(--text-dim); }
    .footer-tag  { font-family: var(--mono); font-size: .68rem; color: var(--border); letter-spacing: .1em; }

    /* SINGLE PROJECT PAGE */
    .project-single { max-width: 820px; margin: 0 auto; padding: 3rem 2rem 5rem; }
    .project-single h1 {
      font-size: clamp(1.8rem, 4vw, 2.8rem); font-weight: 900;
      color: var(--text-bright); letter-spacing: -.02em; margin-bottom: .75rem;
    }
    .project-meta {
      font-family: var(--mono); font-size: .72rem; color: var(--text-dim);
      margin-bottom: 2rem; display: flex; gap: 1.5rem; flex-wrap: wrap;
    }
    .project-single .hero-img {
      width: 100%; max-height: 320px; object-fit: cover;
      border-radius: var(--r); border: 1px solid var(--border); margin-bottom: 2rem;
    }
    .project-single h2 {
      font-size: 1.2rem; font-weight: 700; color: var(--text-bright);
      margin: 2rem 0 .6rem; padding-top: 1.5rem; border-top: 1px solid var(--border);
    }
    .project-single p { color: var(--text); font-size: .92rem; margin-bottom: 1rem; }
    .project-single ul { padding-left: 1.2rem; color: var(--text-dim); font-size: .88rem; margin-bottom: 1rem; }
    .project-single ul li { margin-bottom: .3rem; }
    .project-single #map { border-radius: var(--r); border: 1px solid var(--border); margin: 1.5rem 0; }

    /* MAP STRIP */
    .map-strip {
      width: 100%; height: 320px; position: relative;
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      overflow: hidden;
    }
    #hero-map { width: 100%; height: 100%; pointer-events: none; }
    .map-label {
      position: absolute; bottom: 1rem; left: 1rem; z-index: 500;
      font-family: var(--mono); font-size: .62rem; color: var(--accent-lit);
      letter-spacing: .15em; background: rgba(8,12,18,.82);
      padding: .25rem .65rem; border-radius: 3px; border: 1px solid var(--border);
      pointer-events: none;
    }

    /* RESPONSIVE */
    @media (max-width: 768px) {
      .site-header { padding: 1rem 1.5rem; }
      .hero { padding: 4rem 1.5rem 3rem; min-height: auto; }
      .projects-section, .about-section { padding: 3rem 1.5rem; }
      .site-footer { padding: 1.5rem; }
      .footer-inner { flex-direction: column; gap: .5rem; text-align: center; }
    }
  </style>
</head>
<body>

<header class="site-header">
  <a href="/" class="site-logo">
    <span class="logo-br">[</span>{{ .Site.Params.author | default .Site.Title }}<span class="logo-br">]</span>
  </a>
  <nav class="site-nav">
    <a href="/"          class="{{ if .IsHome }}active{{ end }}">Home</a>
    <a href="/projects/" class="{{ if eq .Section `projects` }}active{{ end }}">Projects</a>
  </nav>
</header>

<main>
  {{ block "main" . }}{{ end }}
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <span class="footer-copy">© {{ now.Year }} {{ .Site.Params.author | default .Site.Title }}</span>
    <span class="footer-tag">// PORTFOLIO</span>
  </div>
</footer>

</body>
</html>
